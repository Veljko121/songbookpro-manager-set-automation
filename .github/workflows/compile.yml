name: Build Executable

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --name set-creator src/set_creator.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-linux
          path: dist/set-creator

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --name set-creator src/set_creator.py

      - name: Build installer
        run: |
          choco install innosetup --yes
          iscc .github/set-creator.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-windows-installer
          path: Output/set-creator-installer.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: |
            artifacts/app-linux/set-creator
            artifacts/app-windows-installer/set-creator-installer.exe